<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anneler Günü — CodeNova</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Exo+2:wght@300&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>

/* ===== AÇILIŞ EKRANI ===== */
:root{--bg:#060d1a;--cyan:#00e5ff;--blue2:#0066ff;--white:#e8f4ff;--gray:#6a8aaa;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);height:100vh;overflow:hidden;}

#intro{
  position:fixed;inset:0;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:100;
  transition:opacity .8s ease, visibility .8s ease;
}
#intro.hide{opacity:0;visibility:hidden;pointer-events:none;}

.intro-logo-img{
  width:150px;height:150px;
  object-fit:contain;border-radius:20px;
  animation:logoSpin 1.2s cubic-bezier(.4,0,.2,1) both;
  filter: drop-shadow(0 0 18px rgba(0,200,255,0.55));
}
@keyframes logoSpin{
  from{opacity:0;transform:scale(.3) rotate(-180deg);}
  to{opacity:1;transform:scale(1) rotate(0);}
}

.intro-name{
  font-family:'Orbitron',sans-serif;
  font-size:2.2rem;font-weight:900;
  letter-spacing:.2em;color:var(--white);
  opacity:0;
  animation:nameReveal .6s .9s ease both;
  margin-top:1.4rem;
}
.intro-name span{color:var(--cyan);}
@keyframes nameReveal{
  from{opacity:0;transform:translateY(16px);letter-spacing:.5em;}
  to{opacity:1;transform:translateY(0);letter-spacing:.2em;}
}

.intro-tagline{
  font-family:'Exo 2',sans-serif;
  font-size:.72rem;letter-spacing:.25em;
  color:var(--gray);text-transform:uppercase;
  opacity:0;
  animation:fadeUp .5s 1.3s ease both;
  margin-top:.5rem;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.intro-bar-wrap{
  position:absolute;bottom:55px;left:50%;
  transform:translateX(-50%);width:220px;text-align:center;
}
.intro-bar-bg{width:100%;height:2px;background:rgba(0,170,255,.13);border-radius:2px;}
.intro-bar-fill{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--blue2),var(--cyan));
  border-radius:2px;
  animation:barFill 2s .4s ease both;
}
@keyframes barFill{from{width:0;}to{width:100%;}}

.intro-pct{
  font-family:'Orbitron',sans-serif;
  font-size:.6rem;color:var(--gray);
  letter-spacing:.1em;margin-top:.5rem;
}

/* ===== ANNELER GÜNÜ SAYFASI ===== */
#main-content{
  position:fixed;inset:0;
  background:radial-gradient(circle at center,#2a0011 0%,#000000 100%);
  display:flex;justify-content:center;align-items:center;
  overflow:hidden;
  opacity:0;
  transition:opacity 1s ease .3s;
}
#main-content.show{opacity:1;}

.heart{
  position:absolute;
  animation:float linear infinite;
  z-index:1;bottom:-50px;
}
@keyframes float{
  0%{transform:translateY(0) scale(0.5);opacity:0;}
  20%{opacity:1;}
  100%{transform:translateY(-100vh) scale(1.5) rotate(15deg);opacity:0;}
}

.content-container{
  position:relative;z-index:10;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
}

.petal{
  transform-origin:50px 50px;
  animation:petalOpen 2.5s ease-out forwards;
}
.center-circle{
  transform-origin:50px 50px;
  animation:centerShow 2.5s ease-out forwards;
}
@keyframes petalOpen{
  0%{transform:scale(0) rotate(-45deg);opacity:0;}
  100%{transform:scale(1) rotate(0deg);opacity:1;}
}
@keyframes centerShow{
  0%{transform:scale(0);opacity:0;}
  70%{transform:scale(0);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.flower-svg{
  animation:spin 20s linear infinite,glowPulse 3s ease-in-out infinite;
  animation-delay:2.5s,2.5s;
  filter:drop-shadow(0 0 15px rgba(255,51,119,0.6));
}
@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
@keyframes glowPulse{
  0%{filter:drop-shadow(0 0 10px rgba(255,51,119,0.4));}
  50%{filter:drop-shadow(0 0 30px rgba(255,102,153,0.9));}
  100%{filter:drop-shadow(0 0 10px rgba(255,51,119,0.4));}
}

.message{
  color:#fff;
  font-family:'Dancing Script',cursive;
  font-size:3.8rem;line-height:1.2;
  margin-top:30px;
  text-shadow:0 0 10px #ff0055,0 0 20px #ff0055,0 0 40px #ff0055,0 0 80px #ff0055;
  opacity:0;
  animation:textFadeIn 2s ease-in forwards;
  animation-delay:2s;
}
@keyframes textFadeIn{
  0%{opacity:0;transform:translateY(20px) scale(0.9);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
</style>
</head>

  </div>

<!-- ANNELER GÜNÜ İÇERİĞİ -->
<div id="main-content">
  <div id="hearts-container"></div>
  <div class="content-container">
    <svg class="flower-svg" viewBox="0 0 100 100" width="280" height="280">
      <circle class="petal" cx="32" cy="32" r="22" fill="#ff3377"/>
      <circle class="petal" cx="68" cy="32" r="22" fill="#ff3377"/>
      <circle class="petal" cx="32" cy="68" r="22" fill="#ff3377"/>
      <circle class="petal" cx="68" cy="68" r="22" fill="#ff3377"/>
      <circle class="petal" cx="50" cy="20" r="22" fill="#ff6699"/>
      <circle class="petal" cx="50" cy="80" r="22" fill="#ff6699"/>
      <circle class="petal" cx="20" cy="50" r="22" fill="#ff6699"/>
      <circle class="petal" cx="80" cy="50" r="22" fill="#ff6699"/>
      <circle class="center-circle" cx="50" cy="50" r="16" fill="#ffcc00"/>
    </svg>
    <div class="message"><br>Anneler Gününüz Kutlu Olsun!</div>
  </div>
</div>

<script>
// Açılış yüzde sayacı
let pct = 0;
const pctEl = document.getElementById('pct');
const mainContent = document.getElementById('main-content');
const intro = document.getElementById('intro');

const iv = setInterval(() => {
  pct = Math.min(pct + Math.random() * 7, 100);
  pctEl.textContent = 'Yükleniyor... ' + Math.floor(pct) + '%';
  if (pct >= 100) {
    clearInterval(iv);
    pctEl.textContent = 'Hazır! ✶';
    setTimeout(() => {
      intro.classList.add('hide');
      mainContent.classList.add('show');
      startHearts();
    }, 450);
  }
}, 75);

// Kalp animasyonlarını başlat
function startHearts() {
  const container = document.getElementById('hearts-container');
  const heartColors = ['#ff0055','#ff3377','#ff1a1a','#ff4d94'];
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML = '❤';
    const randomColor = heartColors[Math.floor(Math.random() * heartColors.length)];
    heart.style.color = randomColor;
    heart.style.textShadow = `0 0 5px ${randomColor},0 0 15px ${randomColor},0 0 30px ${randomColor}`;
    heart.style.left = Math.random() * 100 + 'vw';
    const dur = Math.random() * 4 + 4;
    heart.style.animationDuration = dur + 's';
    heart.style.fontSize = Math.random() * 25 + 10 + 'px';
    container.appendChild(heart);
    setTimeout(() => heart.remove(), dur * 1000);
  }
  setInterval(createHeart, 300);
}
</script>
